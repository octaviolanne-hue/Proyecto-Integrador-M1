<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
<link rel="stylesheet" href="./css/styles.css">
</head>

<body>

<header>

    <h1>Colorfly Studio</h1>

    <p class="subtitle">
        Generador de paletas
    </p>

</header>

<div class="top-controls">

    <div class="controls">

    <button class="selector" data-cantidad="6">6</button>

    <button class="selector" data-cantidad="8">8</button>

    <button class="selector" data-cantidad="9">9</button>

    </div>


    <div class="controls">

    <button class="selector" data-modo="rgba"> RGBA </button>

    <button class="selector" data-modo="hsl"> HSL </button>

    </div>

</div>

</div>

<div class="container"></div>

<button id="btnColor">
    Generar Paletas
</button>

<p id="copiado">
    Código copiado
</p>

<script src="./js/scrip.js"></script>

<footer>

    © 2026 Lanne Octavio Gastón

</footer>

</body>
</html>
